<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Table Reservation</title>
    <style>
        body{
            font-family: Arial;
            background-color: #f4f4f4;
        }
        .container{
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, select{
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button{
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">
<h2>Restaurant Table Reservation</h2>

<form action="reservation.php" method="POST">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="tel" name="phone" required>

<label>Reservation Date</label>
<input type="date" name="date" required>

<label>Reservation Time</label>
<input type="time" name="time" min="00:00" max="23:59" step="60" required>

<label>Number of Guests</label>
<select name="guests">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6+</option>
</select>

<label>Special Requests</label>
<input type="text" name="request">

<button type="submit">Reserve Table</button>

</form>
</div>

</body>
</html>
